<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CEK STATUS PESERTA</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#06152d;
padding:20px;
color:white;
}

.container{
max-width:700px;
margin:auto;
background:#0d2347;
padding:30px;
border-radius:24px;
box-shadow:0 0 40px rgba(0,0,0,0.4);
}

h1{
text-align:center;
margin-bottom:30px;
color:#f6c453;
}

.input-group{
margin-bottom:20px;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#132f5e;
color:white;
font-size:16px;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:14px;
background:#f6c453;
color:#06152d;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.02);
}

.result{
display:none;
margin-top:30px;
background:#132f5e;
padding:25px;
border-radius:18px;
line-height:2;
}

.loading{
display:none;
text-align:center;
margin-top:20px;
color:#f6c453;
}

.status-paid{
color:#6effa7;
font-weight:700;
}

.status-pending{
color:#ffcc66;
font-weight:700;
}

.action-btn{
display:block;
text-decoration:none;
padding:16px;
border-radius:14px;
text-align:center;
font-weight:700;
margin-top:15px;
}

.ebib-btn{
background:#f6c453;
color:#06152d;
}

.share-btn{
background:#25D366;
color:white;
}

.qr-box{
text-align:center;
margin-bottom:25px;
}

.qr-box img{
background:white;
padding:10px;
border-radius:18px;
width:220px;
height:220px;
}

.qr-text{
margin-top:10px;
font-size:14px;
color:#ccc;
}

</style>

</head>

<body>

<div class="container">

<h1>CEK STATUS PESERTA</h1>

<div class="input-group">

<label>Register ID</label>

<input
type="text"
id="registerId"
placeholder="Contoh: RFYL26-5K-M0001">

</div>

<button onclick="cekPeserta()">
CEK STATUS
</button>

<div class="loading" id="loading">
⏳ Sedang mencari data...
</div>

<div class="result" id="resultBox">

<div id="hasil"></div>

</div>

</div>

<script>

// ======================================
// WEB APP URL
// ======================================

const WEBAPP_URL =
"https://script.google.com/macros/s/AKfycbwr5NReGwYtYWt7hvx4Kw_LwAEZ2d0hVj3WGUPxfYzDXfFO8tno8w-PBO026at7ZNAcaw/exec";

// ======================================
// CEK PESERTA
// ======================================

async function cekPeserta(){

const registerId =
document.getElementById("registerId")
.value
.trim();

if(registerId === ""){

alert("Masukkan Register ID");

return;

}

document.getElementById("loading")
.style.display = "block";

document.getElementById("resultBox")
.style.display = "none";

try{

const response = await fetch(
`${WEBAPP_URL}?registerId=${registerId}`
);

const res = await response.json();

document.getElementById("loading")
.style.display = "none";

// ======================================
// DATA DITEMUKAN
// ======================================

if(res.status === "success"){

document.getElementById("resultBox")
.style.display = "block";

// ======================================
// SHARE MESSAGE
// ======================================

const shareText = encodeURIComponent(

`🏃 RUN FOR YOUR LIFE 2026

Nama : ${res.nama}
BIB : ${res.bib}
Kategori : ${res.kategori}

Register ID :
${registerId}`

);

// ======================================
// QR CODE
// ======================================

const qrCode =
`https://script.google.com/macros/s/AKfycbwr5NReGwYtYWt7hvx4Kw_LwAEZ2d0hVj3WGUPxfYzDXfFO8tno8w-PBO026at7ZNAcaw/exec?page=scan&id=${registerId}`;
// ======================================
// E-BIB LINK
// ======================================

const ebibLink =
`${WEBAPP_URL}?id=${registerId}`;

// ======================================
// TAMPILKAN HASIL
// ======================================

document.getElementById("hasil")
.innerHTML = `

<h2 style="
margin-bottom:20px;
color:#f6c453;
">
🏃 DATA PESERTA
</h2>

<div class="qr-box">

<img
src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${qrCode}"
>

<div class="qr-text">
Scan QR untuk Racepack / Check-in
</div>

</div>

<b>Nama :</b>
${res.nama}<br>

<b>BIB :</b>
${res.bib}<br>

<b>Kategori :</b>
${res.kategori}<br>

<b>Jersey :</b>
${res.jersey}<br>

<b>Batch :</b>
${res.batch}<br>

<b>Total :</b>
Rp ${res.harga}<br>

<hr style="
border:none;
border-top:1px solid rgba(255,255,255,0.1);
margin:20px 0;
">

<b>Payment Status :</b>

<span class="${
res.paymentStatus === "PAID"
? "status-paid"
: "status-pending"
}">
${res.paymentStatus}
</span>

<br>

<b>RPC Status :</b>

<span class="${
res.rpcStatus === "DONE"
? "status-paid"
: "status-pending"
}">
${res.rpcStatus}
</span>

<br>

<b>Check-in :</b>

<span class="${
res.checkinStatus === "DONE"
? "status-paid"
: "status-pending"
}">
${res.checkinStatus}
</span>

<a
href="${ebibLink}"
target="_blank"
class="action-btn ebib-btn"
>

🎫 LIHAT E-BIB

</a>

<a
href="https://wa.me/?text=${shareText}"
target="_blank"
class="action-btn share-btn"
>

📩 SHARE DATA PESERTA

</a>

`;

}else{

alert("Data peserta tidak ditemukan");

}

}catch(err){

document.getElementById("loading")
.style.display = "none";

alert("ERROR : " + err.message);

console.log(err);

}

}

</script>

</body>
</html>
